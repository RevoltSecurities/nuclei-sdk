version: 2

project_name: nuclei-sdk-bridge

before:
  hooks:
    - go mod tidy

builds:
  - id: nuclei-sdk-bridge
    main: ./cmd/nuclei-sdk-bridge/
    binary: nuclei-sdk-bridge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: nuclei-sdk-bridge
    builds:
      - nuclei-sdk-bridge
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: RevoltSecurities
    name: nuclei-sdk
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
